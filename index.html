<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Presupuesto</title>
    <link rel="icon" href="Logotipo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
</head>
<body>

<div class="app">
    <header>
        <span class="header-title">Presupuesto</span>
        <div class="header-actions">
            <button class="btn-icon" id="btnReset" title="Reiniciar" aria-label="Reiniciar datos">
                <i class="ti ti-refresh" aria-hidden="true"></i>
            </button>
        </div>
    </header>

    <div class="sueldo-section">
        <div class="sueldo-label">Sueldo neto mensual</div>
        <div class="sueldo-input-wrap">
            <input type="text" id="inp" placeholder="0" inputmode="numeric" autocomplete="off" aria-label="Sueldo mensual">
        </div>
    </div>

    <div class="resumen">
        <div class="res-card">
            <div class="res-label">Asignado</div>
            <div class="res-val" id="resAsignado">$0</div>
        </div>
        <div class="res-card">
            <div class="res-label">Libre</div>
            <div class="res-val" id="resLibre">$0</div>
        </div>
        <div class="res-card">
            <div class="res-label">% asignado</div>
            <div class="res-val" id="resPct">0%</div>
        </div>
        <div class="res-card">
            <div class="res-label">Categorías</div>
            <div class="res-val" id="resCat">0</div>
        </div>
    </div>

    <div class="section-header">
        <span class="section-title">Apartados</span>
        <span class="pct-total" id="pctTotal">0% de 100%</span>
    </div>

    <div class="apartados" id="secap"></div>

    <button class="btn-add" id="agregar" aria-label="Añadir categoría">
        <i class="ti ti-plus" aria-hidden="true"></i>
        Añadir categoría
    </button>
</div>

<!-- Modal de edición -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Editar categoría">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">Editar categoría</div>
        <div class="field">
            <label for="inpTitcam">Nombre</label>
            <input type="text" id="inpTitcam" placeholder="Ej: Ahorro, Renta, Comida..." maxlength="24" autocomplete="off">
        </div>
        <div class="field">
            <label for="inpCant">Porcentaje (%)</label>
            <input type="number" id="inpCant" placeholder="20" min="0" max="100" step="1" inputmode="numeric">
            <div class="pct-hint" id="pctHint"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-primary" id="btnmdce">Guardar</button>
            <button class="btn-danger" id="btnbrr">Eliminar</button>
            <button class="btn-cancel" id="btnCancel">Cancelar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js.js"></script>
<script src="sw.js"></script>

</body>
</html>
